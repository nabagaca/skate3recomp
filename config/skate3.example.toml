# Optional developer override file.
#
# To override cvars locally, copy this file beside skate3.exe as skate3.toml
# and edit values there. Release builds do not require this file.

log_verbose = false
log_level = "info"

protect_zero = false

audio_maxqframes = 16
audio_worker_thread_priority = 0

input_backend = "xinput"
mnk_mode = false
mnk_capture_mouse = false

fullscreen = true
vsync = false
graphics_backend = "d3d12"
video_mode_refresh_rate = 60.0
resolution_scale = 2
draw_resolution_scale_x = 2
draw_resolution_scale_y = 2
d3d12_allow_variable_refresh_rate_and_tearing = true
d3d12_strict_vsync_present = false
d3d12_frame_latency_waitable_object = false
d3d12_max_frame_latency = 1
d3d12_present_frame_limiter = false
d3d12_present_frame_limiter_fps = 120.0
d3d12_present_frame_limiter_sleep_margin_us = 1000
d3d12_present_frame_limiter_spin_us = 150

vblank_host_clock_pacing = false
vblank_precise_sleep_margin_us = 1000
vblank_precise_spin_us = 150
host_present_from_non_ui_thread = true
presenter_strict_guest_output_backpressure = false
presenter_strict_guest_output_backpressure_timeout_ms = 100
vulkan_async_placeholder_max_consecutive_skips = 120

present_letterbox = true
present_safe_area_x = 100
present_safe_area_y = 100
present_effect = "bilinear"

readback_memexport = false
anisotropic_override = -1
texture_cache_memory_limit_render_to_texture = 128
texture_cache_memory_limit_soft = 2048
texture_cache_memory_limit_hard = 4096
texture_cache_memory_limit_soft_lifetime = 300
gpu_allow_invalid_fetch_constants = true
clear_memory_page_state = false
execute_unclipped_draw_vs_on_cpu = true
occlusion_query_enable = true

advanced_settings_overlay_enabled = true

selected_user_profile = "player"
user_profile_name = "Player"
user_profile_xuid = "B13E07DFF9AB6772"
user_profile_signed_in = true
user_live_signed_in = false

game_data_root = ""
